{% extends "base.html" %}

{% block title %}Edit Transaction - Payment Tracker{% endblock %}

{% block content %}
<div class="edit-transaction-container">
    <div class="page-header">
        <h1>Edit Transaction</h1>
        <a href="{{ url_for('transactions_page') }}" class="btn btn-secondary">← Back to Transactions</a>
    </div>
    
    <div class="edit-form-wrapper">
        <form method="POST" class="transaction-form">
            <div class="form-group">
                <label>Type</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="type" value="credit" 
                               {% if transaction.type == 'credit' %}checked{% endif %} required>
                        <span>Credit (Money In)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="type" value="debit" 
                               {% if transaction.type == 'debit' %}checked{% endif %} required>
                        <span>Debit (Money Out)</span>
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0.01" 
                       value="{{ transaction.amount }}" required>
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="">Select Category</option>
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if transaction.category == cat %}selected{% endif %}>
                        {{ cat }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="reason">Reason / Description</label>
                <input type="text" id="reason" name="reason" 
                       value="{{ transaction.reason or '' }}" placeholder="Optional description">
            </div>
            
            <div class="form-actions">
                <a href="{{ url_for('transactions_page') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Update Transaction</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
